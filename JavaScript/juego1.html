<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Top-Down Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            border: 4px solid #00ffff;
            background-color: #000;
            box-shadow: 0 0 20px #ff00ff;
            cursor: crosshair;
        }

        .ui {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>NEON STRIKE</h1>
        <p>WASD: Mover | CLICK: Disparar</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;

        // --- Configuración y Estado ---
        const player = {
            x: 400,
            y: 300,
            size: 20,
            color: '#00ffff',
            speed: 4,
            angle: 0
        };

        let bullets = [];
        let enemies = [];
        let score = 0;
        let keys = {};

        // --- Input ---
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        });

        window.addEventListener('mousedown', () => {
            bullets.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(player.angle) * 10,
                vy: Math.sin(player.angle) * 10,
                size: 4
            });
        });

        // --- Lógica del Juego ---
        function spawnEnemy() {
            if (enemies.length < 5) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 20,
                    color: '#ff0055',
                    speed: 1.5 + Math.random()
                });
            }
        }

        function update() {
            // Movimiento jugador
            if (keys['KeyW']) player.y -= player.speed;
            if (keys['KeyS']) player.y += player.speed;
            if (keys['KeyA']) player.x -= player.speed;
            if (keys['KeyD']) player.x += player.speed;

            // Balas
            bullets.forEach((b, i) => {
                b.x += b.vx;
                b.y += b.vy;
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                }
            });

            // Enemigos (Persiguen al jugador)
            enemies.forEach((en, i) => {
                const dx = player.x - en.x;
                const dy = player.y - en.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                en.x += (dx / dist) * en.speed;
                en.y += (dy / dist) * en.speed;

                // Colisión con balas
                bullets.forEach((b, bi) => {
                    const distB = Math.sqrt((b.x - en.x)**2 + (b.y - en.y)**2);
                    if (distB < en.size) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 100;
                    }
                });

                // Colisión con jugador (Muerte)
                if (dist < player.size) {
                    alert("GAME OVER - Puntuación: " + score);
                    document.location.reload();
                }
            });
        }

        // --- Renderizado ---
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // Efecto estela
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Jugador
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            // "Arma" para indicar dirección
            ctx.fillStyle = 'white';
            ctx.fillRect(10, -2, 10, 4);
            ctx.restore();

            // Dibujar Balas
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Dibujar Enemigos
            enemies.forEach(en => {
                ctx.fillStyle = en.color;
                ctx.beginPath();
                ctx.moveTo(en.x, en.y - en.size);
                ctx.lineTo(en.x + en.size, en.y + en.size);
                ctx.lineTo(en.x - en.size, en.y + en.size);
                ctx.closePath();
                ctx.fill();
            });

            // UI Score
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`SCORE: ${score}`, 20, 30);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        setInterval(spawnEnemy, 2000);
        gameLoop();
    </script>
</body>
</html>

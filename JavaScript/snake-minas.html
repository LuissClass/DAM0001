<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Snake-Minas (Modo Fácil)</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #ui { text-align: center; margin-bottom: 10px; }
        .stats { font-size: 1.4rem; color: #2ecc71; font-weight: bold; }
        canvas { 
            background-color: #333; 
            border: 5px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .info { color: #aaa; margin-top: 15px; font-size: 0.9rem; }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>SNAKE-MINAS <small>(Easy Mode)</small></h1>
        <div class="stats">Puntos: <span id="score">0</span></div>
        <div id="status" style="margin-top:5px;">Usa las flechas para explorar</div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="info">Minas: 15 | Velocidad: Lenta | Las manzanas son 100% seguras</div>
    <button onclick="resetGame()">Reiniciar Partida</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const statusEl = document.getElementById("status");

        const grid = 20;
        let snake, food, dx, dy, score, gameActive, mines, revealed;

        function resetGame() {
            snake = [{x: 10, y: 10}];
            food = {x: 5, y: 5};
            dx = 0;
            dy = 0;
            score = 0;
            gameActive = true;
            scoreEl.textContent = "0";
            statusEl.textContent = "¡Sobrevive!";
            statusEl.style.color = "white";
            
            // 1. Crear tablero vacío
            mines = Array(20).fill().map(() => Array(20).fill(false));
            revealed = Array(20).fill().map(() => Array(20).fill(false));
            
            // 2. Colocar solo 15 minas
            let placedMines = 0;
            while (placedMines < 15) {
                let rx = Math.floor(Math.random() * 20);
                let ry = Math.floor(Math.random() * 20);
                
                // REGLA: No mina en la serpiente inicial ni en la comida inicial
                const esInicio = (rx === 10 && ry === 10);
                const esComida = (rx === food.x && ry === food.y);
                
                if (!mines[rx][ry] && !esInicio && !esComida) {
                    mines[rx][ry] = true;
                    placedMines++;
                }
            }
            revealed[10][10] = true;
        }

        function draw() {
            if (!gameActive) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Chocar con paredes
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || checkSelfCollision(head)) {
                endGame("¡Chocaste!");
                return;
            }

            // Chocar con MINA
            if (mines[head.x][head.y]) {
                endGame("¡BOOM! Había una mina");
                return;
            }

            snake.unshift(head);
            revealed[head.x][head.y] = true;

            // Comer manzana
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
            } else {
                if (dx !== 0 || dy !== 0) snake.pop();
            }

            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar el suelo (Buscaminas)
            for (let x = 0; x < 20; x++) {
                for (let y = 0; y < 20; y++) {
                    if (revealed[x][y]) {
                        ctx.fillStyle = "#dfe6e9";
                        ctx.fillRect(x * grid, y * grid, grid - 1, grid - 1);
                        
                        let n = countMines(x, y);
                        if (n > 0 && !mines[x][y]) {
                            ctx.fillStyle = n === 1 ? "blue" : n === 2 ? "green" : "red";
                            ctx.font = "bold 12px Arial";
                            ctx.fillText(n, x * grid + 7, y * grid + 14);
                        }
                    } else {
                        ctx.fillStyle = "#444";
                        ctx.fillRect(x * grid, y * grid, grid - 1, grid - 1);
                    }
                }
            }

            // Dibujar Comida (Rosa fuerte)
            ctx.fillStyle = "#fd79a8";
            ctx.fillRect(food.x * grid, food.y * grid, grid - 1, grid - 1);

            // Dibujar Serpiente (Verde brillante)
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00b894" : "#55efc4";
                ctx.fillRect(part.x * grid, part.y * grid, grid - 1, grid - 1);
            });
        }

        function countMines(x, y) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (mines[x + i] && mines[x + i][y + j]) count++;
                }
            }
            return count;
        }

        function placeFood() {
            let newFood = {
                x: Math.floor(Math.random() * 20),
                y: Math.floor(Math.random() * 20)
            };
            // REGLA: La comida no puede estar donde hay una mina ni sobre la serpiente
            if (mines[newFood.x][newFood.y] || snake.some(p => p.x === newFood.x && p.y === newFood.y)) {
                return placeFood();
            }
            food = newFood;
        }

        function checkSelfCollision(head) {
            return snake.slice(1).some(part => part.x === head.x && part.y === head.y);
        }

        function endGame(msg) {
            gameActive = false;
            statusEl.textContent = msg;
            statusEl.style.color = "#ff7675";
            render();
            // Revelar todas las minas al perder
            for (let x = 0; x < 20; x++) {
                for (let y = 0; y < 20; y++) {
                    if (mines[x][y]) {
                        ctx.fillStyle = "red";
                        ctx.font = "12px Arial";
                        ctx.fillText("💣", x * grid + 2, y * grid + 14);
                    }
                }
            }
        }

        window.addEventListener("keydown", e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
            switch (e.key) {
                case "ArrowUp": if (dy === 0) { dx = 0; dy = -1; } break;
                case "ArrowDown": if (dy === 0) { dx = 0; dy = 1; } break;
                case "ArrowLeft": if (dx === 0) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });

        resetGame();
        setInterval(draw, 250); // Velocidad reducida
    </script>
</body>
</html>

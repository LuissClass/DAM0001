<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>j4 — Muchísimo JavaScript</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #0a0a0f;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow-x: hidden;
  }
  h1 {
    text-align: center;
    margin-top: 20px;
    font-size: 2.2rem;
  }
  #panel {
    margin: 20px auto;
    width: 90%;
    max-width: 700px;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
  button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #ffb347;
    color: #000;
    font-weight: bold;
  }
  #log {
    background: #000;
    padding: 10px;
    height: 180px;
    overflow-y: auto;
    border-radius: 8px;
    font-size: 0.85rem;
  }
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffdd99;
    border-radius: 50%;
    opacity: 0.8;
  }
  #gameCanvas {
    background: #222;
    display: block;
    margin: 20px auto;
    border-radius: 10px;
  }
</style>
</head>
<body>

<h1>Página j4 — Muchísimo JavaScript</h1>

<div id="panel">
  <h2>Panel interactivo</h2>
  <p>Esta página contiene toneladas de JavaScript para probar, jugar y experimentar.</p>

  <button onclick="addLog('Botón pulsado')">Añadir log</button>
  <button onclick="generatePhrase()">Frase aleatoria</button>
  <button onclick="spawnParticles()">Partículas</button>
  <button onclick="startGame()">Iniciar mini‑juego</button>
  <button onclick="location.href='j3.html'">Volver a j3</button>

  <h3>Reloj en tiempo real</h3>
  <div id="clock" style="font-size:1.4rem; margin-bottom:10px;"></div>

  <h3>Log de eventos</h3>
  <div id="log"></div>
</div>

<canvas id="gameCanvas" width="500" height="300"></canvas>

<div id="particles"></div>

<script>
// MUCHÍSIMO JAVASCRIPT A PARTIR DE AQUÍ
// -------------------------------------

// LOG SYSTEM
function addLog(msg) {
  const log = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  log.innerHTML += `[${time}] ${msg}<br>`;
  log.scrollTop = log.scrollHeight;
  console.log("LOG:", msg);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString();
}, 1000);

// RANDOM PHRASES
const phrases = [
  "Los perros voladores dominarán el cielo.",
  "El JavaScript es infinito.",
  "Hoy es un buen día para programar.",
  "Nunca confíes en un semáforo sin batería.",
  "Si puedes imaginarlo, puedes programarlo."
];

function generatePhrase() {
  const phrase = phrases[Math.floor(Math.random() * phrases.length)];
  addLog("Frase generada: " + phrase);
  alert(phrase);
}

// PARTICLE SYSTEM
function spawnParticles() {
  for (let i = 0; i < 50; i++) {
    createParticle();
  }
  addLog("Partículas generadas");
}

function createParticle() {
  const p = document.createElement("div");
  p.className = "particle";
  const container = document.getElementById("particles");

  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.top = window.innerHeight + "px";

  container.appendChild(p);

  const speed = 1 + Math.random() * 3;
  const drift = (Math.random() - 0.5) * 2;

  function animate() {
    const y = parseFloat(p.style.top);
    const x = parseFloat(p.style.left);

    p.style.top = (y - speed) + "px";
    p.style.left = (x + drift) + "px";

    if (y < -20) {
      p.remove();
    } else {
      requestAnimationFrame(animate);
    }
  }
  animate();
}

// KEYBOARD EVENTS
document.addEventListener("keydown", e => {
  addLog("Tecla presionada: " + e.key);
});

// MOUSE EVENTS
document.addEventListener("mousemove", e => {
  if (Math.random() < 0.01) {
    addLog(`Ratón en (${e.clientX}, ${e.clientY})`);
  }
});

// MINI GAME
let gameRunning = false;
let player = { x: 50, y: 150, size: 20 };
let obstacles = [];
let ctx = document.getElementById("gameCanvas").getContext("2d");

function startGame() {
  if (gameRunning) return;
  gameRunning = true;
  obstacles = [];
  player.x = 50;
  player.y = 150;
  addLog("Mini‑juego iniciado");
  gameLoop();
}

function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, 500, 300);

  // Player
  ctx.fillStyle = "#ffb347";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Obstacles
  if (Math.random() < 0.03) {
    obstacles.push({ x: 500, y: Math.random() * 280, size: 20 });
  }

  obstacles.forEach(o => {
    o.x -= 3;
    ctx.fillStyle = "#ff4444";
    ctx.fillRect(o.x, o.y, o.size, o.size);

    // Collision
    if (
      o.x < player.x + player.size &&
      o.x + o.size > player.x &&
      o.y < player.y + player.size &&
      o.y + o.size > player.y
    ) {
      gameOver();
    }
  });

  obstacles = obstacles.filter(o => o.x > -20);

  requestAnimationFrame(gameLoop);
}

function gameOver() {
  gameRunning = false;
  addLog("¡Game Over!");
  alert("¡Game Over!");
}

// Player movement
document.addEventListener("keydown", e => {
  if (!gameRunning) return;
  if (e.key === "ArrowUp") player.y -= 10;
  if (e.key === "ArrowDown") player.y += 10;
});

</script>

</body>
</html>
